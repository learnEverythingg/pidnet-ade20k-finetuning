CUDNN:
  BENCHMARK: true
  DETERMINISTIC: false
  ENABLED: true
GPUS: (0,)
OUTPUT_DIR: 'output_small'
LOG_DIR: 'logs_small'
WORKERS: 4
PRINT_FREQ: 100

DATASET:
  DATASET: ade20k
  ROOT: "D:/inProgress/DeepLearning/Project/PIDNet/data/ADE20K"
  OBJECT_PATH: "D:/inProgress/DeepLearning/Project/PIDNet/data/ADE20K/objectInfo150.txt"
  NUM_CLASSES: 21
MODEL:
  NAME: pidnet_s
  NUM_OUTPUTS: 2 # 2 for ohem
  PRETRAINED: "D:/inProgress/DeepLearning/Project/PIDNet/pretrained_models/imagenet/PIDNet_S_ImageNet.pth.tar"
LOSS:
  USE_OHEM: true 
  OHEMTHRES: 0.9
  OHEMKEEP: 131072
  BALANCE_WEIGHTS: [1,1]
  SB_WEIGHTS: 1.0
TRAIN:
  IMAGE_SIZE:
  - 512  
  - 512
  BASE_SIZE: 1024
  BATCH_SIZE_PER_GPU: 8
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 80
  RESUME: true
  OPTIMIZER: sgd
  LR: 0.001
  WD: 0.0005
  MOMENTUM: 0.9
  NESTEROV: true
  FLIP: true
  MULTI_SCALE: true
  IGNORE_LABEL: 255
  SCALE_FACTOR: 16
TEST:
  IMAGE_SIZE:
  - 512
  - 512
  BASE_SIZE: 1024
  BATCH_SIZE_PER_GPU: 2
  FLIP_TEST: false
  MULTI_SCALE: false
  MODEL_FILE: ''
  OUTPUT_INDEX: 1
